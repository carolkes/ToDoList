<html>
  <head>
    <meta charset="utf-8" />
    <title>To-Do List</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    />
    <script src="script.js" type="text/javascript"></script>
  </head>
  <body>
    <div class="title">
      <h2>My To-Do List</h2>
    </div>
    <div class="container">
      <div class="mb-3">
        <div class="input-group">
          <input
            id="input-task"
            type="text"
            class="form-control"
            placeholder="digite o nome da tarefa"
            aria-label="digite o nome da tarefa"
            aria-describedby="button-addon2"
          />
          <button
            class="btn btn-outline-primary"
            type="button"
            id="button-addon2"
          >
            Criar
          </button>
        </div>
      </div>

      <ul class="list-group" id="task-list">
        <li class="list-group-item">
          <input
            class="form-check-input me-1"
            type="checkbox"
            value=""
            id="firstCheckboxStretched"
          />
          <label
            class="form-check-label stretched-link"
            for="firstCheckboxStretched"
            >First checkbox</label
          >
        </li>
        <li class="list-group-item">
          <input
            class="form-check-input me-1"
            type="checkbox"
            value=""
            id="secondCheckboxStretched"
          />
          <label
            class="form-check-label stretched-link"
            for="secondCheckboxStretched"
            >Second checkbox</label
          >
        </li>
        <li class="list-group-item">
          <input
            class="form-check-input me-1"
            type="checkbox"
            value=""
            id="thirdCheckboxStretched"
          />
          <label
            class="form-check-label stretched-link"
            for="thirdCheckboxStretched"
            >Third checkbox</label
          >
        </li>
      </ul>
    </div>
  </body>
</html>
